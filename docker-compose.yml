version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: expense-plan-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expense_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expense_password}
      POSTGRES_DB: ${POSTGRES_DB:-expense_plan_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expense_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-plan-app
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_USER: ${POSTGRES_USER:-expense_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-expense_password}
      DB_NAME: ${POSTGRES_DB:-expense_plan_db}
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-change-this}
      ENCRYPTION_IV: ${ENCRYPTION_IV:-your-encryption-iv-change-this}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
